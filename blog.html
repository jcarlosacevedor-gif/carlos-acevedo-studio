<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes from the Studio | Carlos Acevedo Studio</title>
  <link rel="stylesheet" href="assets/styles/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-brand" href="index.html" aria-label="Carlos Acevedo Studio home">
        <img src="assets/images/Logotipo_Zoom.png" alt="Carlos Acevedo Studio logo">
      </a>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="premium-services.html">Services</a>
        <a href="blog.html" aria-current="page">Blog</a>
        <a href="booking.html">Booking</a>
      </nav>
    </div>
  </header>
  <main class="blog-hero">
    <div class="blog-content">
      <div class="blog-language-toggle" data-current-language="en">
        <input type="radio" name="blog-language" id="blog-lang-en" value="en" checked>
        <input type="radio" name="blog-language" id="blog-lang-es" value="es">

        <div class="blog-language-toggle-controls">
          <label for="blog-lang-en" class="blog-lang-button">ENGLISH</label>
          <label for="blog-lang-es" class="blog-lang-button">Espa&ntilde;ol</label>
        </div>

        <section class="blog-language-panel blog-language-active">
          <p class="hero-eyebrow" data-blog-field="eyebrow"></p>
          <h1 class="blog-title" data-blog-field="title"></h1>
          <div class="blog-divider"></div>
          <p class="blog-description" data-blog-field="description"></p>
        </section>
      </div>

      <section class="blog-grid" id="blog-grid" aria-live="polite"></section>
    </div>
  </main>

  <script>
    const blogContent = {
      hero: {
        eyebrow: {
          en: "CREATIVE JOURNAL",
          es: "DIARIO CREATIVO"
        },
        title: {
          en: "Notes from the Studio",
          es: "Notas desde el Estudio"
        },
        description: {
          en: "A visual journal of daily work, reflections, experiments, music, ideas, and creative progress from the studio.",
          es: "Un diario visual del trabajo diario, reflexiones, experimentos, m\u00fasica, ideas y avances creativos desde el estudio."
        }
      },
      empty: {
        en: "No posts published yet.",
        es: "A\u00fan no hay publicaciones."
      },
      posts: [
        {
          "href": "posts/2026/2026-04-09-sin-permiso-de-nadie-te-doy-la-bienvenida.html",
          "image": "assets/images/blog/2026/2026-04-09-sin-permiso-de-nadie-te-doy-la-bienvenida-cover.png",
          "meta": {
            "en": "April 09, 2026 · Studio Notes",
            "es": "9 de abril de 2026 · Notas del Estudio"
          },
          "title": {
            "en": "Without anyone's permission: I welcome you.",
            "es": "Sin permiso de nadie: Te doy la bienvenida."
          },
          "excerpt": {
            "en": "This article reflects on the long journey of creating a personal platform dedicated to artistic expression and education, born from perseverance amidst challenges. It celebrates the idea of independence, emphasizing the importance of nurturing creativity without external constraints, while acknowledging the support of individuals who inspired and encouraged this endeavor along the way.",
            "es": "En este espacio, se materializa un anhelo de independencia creativa que ha sido alimentado por años de aprendizaje, perseverancia y una conexión profunda con las personas. Aquí se reúnen diversas inquietudes, desde la educación hasta la creación artística, en un entorno que busca la libertad de expresión y el intercambio humano sin mediaciones. Este es el inicio de una nueva etapa que celebra no solo el esfuerzo personal, sino también el apoyo de quienes han estado presentes en este camino."
          }
        }
      ]
    };

    let currentLanguage = "en";

    const blogToggle = document.querySelector(".blog-language-toggle");
    const blogGrid = document.getElementById("blog-grid");
    const languageInputs = document.querySelectorAll('input[name="blog-language"]');
    const heroFields = {
      eyebrow: document.querySelector('[data-blog-field="eyebrow"]'),
      title: document.querySelector('[data-blog-field="title"]'),
      description: document.querySelector('[data-blog-field="description"]')
    };

    function createBlogCard(post, language) {
      const article = document.createElement("article");
      article.className = "blog-card";

      const link = document.createElement("a");
      link.className = "blog-card-link";
      link.href = post.href;

      const image = document.createElement("div");
      image.className = "blog-card-image";
      image.style.backgroundImage = "url('" + post.image + "')";
      image.setAttribute("aria-hidden", "true");

      const body = document.createElement("div");
      body.className = "blog-card-body";

      const meta = document.createElement("p");
      meta.className = "blog-card-meta";
      meta.textContent = post.meta[language];

      const title = document.createElement("h2");
      title.textContent = post.title[language];

      const excerpt = document.createElement("p");
      excerpt.className = "blog-card-excerpt";
      excerpt.textContent = post.excerpt[language];

      body.append(meta, title, excerpt);
      link.append(image, body);
      article.appendChild(link);

      return article;
    }

    function createEmptyState(language) {
      const emptyState = document.createElement("article");
      emptyState.className = "blog-empty-state";

      const message = document.createElement("p");
      message.className = "blog-empty-state-message";
      message.textContent = blogContent.empty[language];

      emptyState.appendChild(message);
      return emptyState;
    }

    function renderBlog(language) {
      currentLanguage = language;
      blogToggle.dataset.currentLanguage = language;
      document.documentElement.lang = language;
      document.title = blogContent.hero.title[language] + " | Carlos Acevedo Studio";

      heroFields.eyebrow.textContent = blogContent.hero.eyebrow[language];
      heroFields.title.textContent = blogContent.hero.title[language];
      heroFields.description.textContent = blogContent.hero.description[language];

      const fragment = document.createDocumentFragment();
      if (blogContent.posts.length === 0) {
        fragment.appendChild(createEmptyState(language));
      } else {
        blogContent.posts.forEach((post) => {
          fragment.appendChild(createBlogCard(post, language));
        });
      }

      blogGrid.replaceChildren(fragment);
    }

    languageInputs.forEach((input) => {
      input.addEventListener("change", (event) => {
        if (event.target.checked) {
          renderBlog(event.target.value);
        }
      });
    });

    renderBlog(currentLanguage);
  </script>
</body>
</html>
